<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rejestr przestojów linii</title>

<style>
body { font-family: Arial; margin:0; background:#f5f7f8; }
.app { max-width:1100px; margin:auto; padding:20px; }
h1 { margin-bottom:10px; }
.panel { background:white; padding:15px; border-radius:10px; margin-bottom:10px; }
button { padding:10px; margin:5px; cursor:pointer; }
.stop { background:#b42318; color:white; }
.work { background:#127a52; color:white; }
table { width:100%; border-collapse:collapse; background:white; }
td,th { padding:8px; border-bottom:1px solid #ddd; }
.timer { font-size:30px; font-weight:bold; }
</style>

</head>
<body>

<div class="app">

<h1>Rejestr przestojów</h1>

<div class="panel">
  <div><b>Status:</b> <span id="status">Ładowanie...</span></div>
  <div class="timer" id="timer">00:00:00</div>
</div>

<div class="panel">
  <select id="linia">
    <option>L 1/2</option>
    <option>L 6/7</option>
    <option>L 8</option>
    <option>L 9</option>
    <option>L 10</option>
    <option>L 11</option>
    <option>L 12</option>
    <option>L 15</option>
    <option>L 16</option>
    <option>L 19</option>
    <option>L 20</option>
  </select>

  <button class="stop" onclick="startStop('Awaria')">Awaria</button>
  <button class="stop" onclick="startStop('Brak materiału')">Brak materiału</button>
  <button class="stop" onclick="startStop('Mikroprzestój')">Mikro</button>
  <button class="work" onclick="startStop('Praca')">Praca</button>
</div>

<div class="panel">
  <h3>Rejestr</h3>
  <table>
    <thead>
      <tr>
        <th>Status</th>
        <th>Linia</th>
        <th>Czas</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

</div>

<script>
let data = [];

async function load() {
  const res = await fetch("/api/dane");
  data = await res.json();
  render();
}

async function startStop(status) {
  const linia = document.getElementById("linia").value;

  await fetch("/api/dodaj", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ linia, status })
  });

  load();
}

function render() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  if (!data.length) {
    document.getElementById("status").innerText = "Brak danych";
    return;
  }

  const last = data[data.length - 1];
  document.getElementById("status").innerText = last.status;

  data.forEach(d => {
    table.innerHTML += `
      <tr>
        <td>${d.status}</td>
        <td>${d.linia}</td>
        <td>${d.czasTrwaniaMin ?? 0} min</td>
      </tr>
    `;
  });
}

function tick() {
  if (!data.length) return;

  const last = data[data.length - 1];

  if (last.status !== "Praca") {
    const diff = Date.now() - last.startCzas;
    const min = Math.floor(diff / 60000);
    document.getElementById("timer").innerText =
      String(Math.floor(min/60)).padStart(2,"0") + ":" +
      String(min%60).padStart(2,"0") + ":00";
  } else {
    document.getElementById("timer").innerText = "00:00:00";
  }
}

setInterval(load, 5000);
setInterval(tick, 1000);

load();
</script>

</body>
</html>
